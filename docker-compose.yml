services:
  postgres:
    image: postgres:17
    container_name: hexa-postgres
    environment:
      POSTGRES_DB: hexa
      POSTGRES_USER: hexa
      POSTGRES_PASSWORD: hexa
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexa -d hexa"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: hexa-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hexa
      SPRING_DATASOURCE_USERNAME: hexa
      SPRING_DATASOURCE_PASSWORD: hexa
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
